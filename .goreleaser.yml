# Ensure version is set to 2
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    ignore:
      - goos: darwin
        goarch: arm
    binary: '{{ .ProjectName }}_v{{ .Version }}' # 👈 Changed \_ to _

archives:
  - format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}' # 👈 Changed \_ to _

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS' # 👈 Changed \_ to _
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch" # 👈 Safely bypasses the TTY/ioctl interactive prompt error
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

